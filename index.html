<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="topbar">
      <button id="newBtn">new note</button>
    </div>
    <input id="searchBox" type="text" placeholder="search..." autocomplete="off" />
    <ul id="noteList"></ul>
    <p class="hint" id="searchHint">results ranked by tf-idf</p>
  </aside>

  <main class="editor">
    <div class="pane">
      <textarea id="editor" placeholder="# write something"></textarea>
    </div>
    <div class="pane preview" id="preview"></div>
    <div class="actions">
      <button id="deleteBtn">delete</button>
      <span id="status"></span>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="search.js"></script>
  <script src="app.js"></script>
</body>
</html>
